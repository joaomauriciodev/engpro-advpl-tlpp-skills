name: CI - Validation, Security & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

permissions:
  contents: write

jobs:
  validation-scan:
    name: Validation Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y git curl

      - name: Make scripts executable
        run: chmod +x ci/scripts/*.sh

      - name: Run validation scan
        run: ./ci/scripts/validation-scan.sh

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y git curl

      - name: Make scripts executable
        run: chmod +x ci/scripts/*.sh

      - name: Run security scan
        run: ./ci/scripts/security-scan.sh

  build-and-release:
    name: Build & Publish Release Artifacts
    runs-on: ubuntu-latest
    needs: [validation-scan, security-scan]
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y zip

      - name: Make scripts executable
        run: chmod +x ci/scripts/*.sh

      - name: Prepare build directories
        run: |
          sudo mkdir -p /engpro-ai/agent-skills
          sudo cp -r ${{ github.workspace }}/skills /engpro-ai/agent-skills/
          sudo cp -r ${{ github.workspace }}/instructions /engpro-ai/agent-skills/
          if [ -d "${{ github.workspace }}/agents" ]; then
            sudo cp -r ${{ github.workspace }}/agents /engpro-ai/agent-skills/
          fi
          sudo chmod -R 777 /engpro-ai/agent-skills

      - name: Run build
        run: ./ci/scripts/build.sh

      - name: Upload release artifacts
        uses: softprops/action-gh-release@v2
        with:
          files: /engpro-ai/agent-skills/release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
